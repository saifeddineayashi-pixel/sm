<!DOCTYPE html>
<html dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Receiver - Live Audio Receiver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .status {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.1em;
        }
        .audio-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: none;
        }
        audio {
            width: 100%;
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        button:hover { background: #45a049; }
        iframe {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 100%;
        }
        .debug {
            font-size: 0.8em;
            color: #ddd;
            margin-top: 15px;
            text-align: left;
            direction: ltr;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Receiver - Live Audio Receiver</h1>
        <iframe width="220" height="390" 
                src="https://www.youtube.com/embed/sU8DHBeWGv0?autoplay=1&mute=1" 
                title="YouTube video" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
        </iframe>
        <div class="status" id="status">⏳ Waiting for sender...</div>
        
        <div class="audio-container" id="audioContainer">
            <h3>🔊 Live Audio:</h3>
            <audio id="remoteAudio" controls></audio>
            <button id="playButton">▶️ Play Audio</button>
        </div>
        
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace this with your actual Render URL
        const SIGNALING_SERVER = 'wss://sm-frqs.onrender.com';

        let peerConnection;
        let ws;
        let audioElement = document.getElementById('remoteAudio');
        let audioContainer = document.getElementById('audioContainer');
        let playButton = document.getElementById('playButton');
        let debugDiv = document.getElementById('debug');
        let remoteStream = null;

        function log(msg) {
            console.log(msg);
            debugDiv.innerHTML += msg + '<br>';
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        function init() {
            try {
                ws = new WebSocket(SIGNALING_SERVER);
                
                ws.onopen = () => {
                    updateStatus('✅ Connected to signaling server');
                    ws.send(JSON.stringify({ type: 'register', role: 'receiver' }));
                };

                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    log(`📩 Message: ${data.type}`);
                    
                    if (data.type === 'offer') {
                        await handleOffer(data.offer);
                    } else if (data.type === 'ice-candidate' && data.candidate) {
                        log(`🧊 Adding ICE candidate from sender`);
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('❌ WebSocket error');
                };

                ws.onclose = (event) => {
                    updateStatus(`❌ Disconnected (code: ${event.code})`);
                };
                
            } catch (e) {
                updateStatus('❌ Failed to connect: ' + e.message);
            }
        }

        async function handleOffer(offer) {
            const configuration = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    {
                        urls: 'turn:openrelay.metered.ca:80',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    },
                    {
                        urls: 'turn:openrelay.metered.ca:443',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ]
            };
            
            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ontrack = (event) => {
                log(`✅ Received track: ${event.track.kind}`);
                
                if (event.track.kind === 'audio') {
                    remoteStream = event.streams[0];
                    audioElement.srcObject = remoteStream;
                    audioContainer.style.display = 'block';
                    updateStatus('✅ Audio received, waiting for play...');
                    
                    audioElement.play()
                        .then(() => {
                            log('✅ Autoplay succeeded');
                            playButton.style.display = 'none';
                        })
                        .catch(e => {
                            log('⚠️ Autoplay blocked, use play button');
                            playButton.style.display = 'inline-block';
                        });
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    log(`🧊 Sending ICE candidate to sender`);
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        target: 'sender',
                        candidate: event.candidate
                    }));
                }
            };

            peerConnection.onicegatheringstatechange = () => {
                log(`ICE gathering state: ${peerConnection.iceGatheringState}`);
            };

            peerConnection.oniceconnectionstatechange = () => {
                log(`ICE connection state: ${peerConnection.iceConnectionState}`);
                if (peerConnection.iceConnectionState === 'failed') {
                    updateStatus('❌ ICE connection failed - restarting...');
                    peerConnection.restartIce();
                }
            };

            peerConnection.onconnectionstatechange = () => {
                log(`Connection state: ${peerConnection.connectionState}`);
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('✅ Connected and receiving');
                } else if (peerConnection.connectionState === 'failed') {
                    updateStatus('❌ Connection failed');
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            ws.send(JSON.stringify({ type: 'answer', answer: peerConnection.localDescription }));
            log('📤 Answer sent');
        }

        playButton.addEventListener('click', () => {
            if (remoteStream) {
                audioElement.play()
                    .then(() => {
                        playButton.style.display = 'none';
                        log('✅ Manual play succeeded');
                    })
                    .catch(e => {
                        log(`❌ Play error: ${e.message}`);
                    });
            } else {
                alert('No audio stream yet');
            }
        });

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        window.onload = init;
    </script>
</body>
</html>
